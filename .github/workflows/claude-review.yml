name: Claude Auto Review

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head (read-only)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write MCP config
        run: |
          cat > /tmp/mcp.json <<'JSON'
          {
            "mcpServers": {
              "github": {
                "command": "npx",
                "args": ["-y", "@modelcontextprotocol/server-github"],
                "env": {
                  "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                }
              }
            }
          }
          JSON

      - name: Run Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: "anthropic/claude-opus-4.7"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: "true"
        run: |
          REVIEW_PROMPT=""
          if [ -f .github/prompts/review.md ]; then
            REVIEW_PROMPT=$(cat .github/prompts/review.md)
          fi
          if [ -z "$REVIEW_PROMPT" ]; then
            if git fetch --no-tags origin ${{ github.event.pull_request.base.sha }} --depth=1 >/dev/null 2>&1; then
              REVIEW_PROMPT=$(git show "${{ github.event.pull_request.base.sha }}:.github/prompts/review.md" 2>/dev/null || true)
              if [ -z "$REVIEW_PROMPT" ]; then
                echo "Warning: .github/prompts/review.md was not found at base commit SHA." >&2
              fi
            else
              echo "Warning: failed to fetch base commit SHA for prompt lookup." >&2
              REVIEW_PROMPT=""
            fi
          fi
          if [ -z "$REVIEW_PROMPT" ]; then
            echo "Error: review prompt file not found in PR head or base commit. Ensure .github/prompts/review.md exists, or merge the latest base branch changes." >&2
            exit 1
          fi
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          claude -p "You are reviewing PR #${PR_NUMBER} in ${REPO}.

          ${REVIEW_PROMPT}" \
            --model opus \
            --mcp-config /tmp/mcp.json \
            --output-format stream-json \
            --verbose
