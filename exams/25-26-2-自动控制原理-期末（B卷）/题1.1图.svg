<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black"/>
    </marker>
    <style>
      .box { fill: none; stroke: black; stroke-width: 3; }
      .line { stroke: black; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .noline { stroke: black; stroke-width: 2; fill: none; }
      .text { font-family: sans-serif; font-size: 22px; fill: black; text-anchor: middle; dominant-baseline: middle; font-weight: bold; }
      .title { font-family: 'SimSun', serif; font-size: 28px; fill: black; text-anchor: middle; }
      .label { font-family: sans-serif; font-size: 22px; fill: black; font-weight: bold; }
    </style>
  </defs>
  <text x="90" y="70" class="label" text-anchor="middle">期望车速</text>
  <line x1="40" y1="90" x2="160" y2="90" class="line" />
  <circle cx="180" cy="90" r="15" fill="none" stroke="black" stroke-width="2" />
  <line x1="169" y1="79" x2="191" y2="101" class="noline" />
  <line x1="169" y1="101" x2="191" y2="79" class="noline" />
  <text x="160" y="115" class="label" font-size="18">-</text>
  <line x1="195" y1="90" x2="265" y2="90" class="line" />
  <rect x="270" y="60" width="110" height="60" class="box" />
  <text x="325" y="90" class="text">电机</text>
  <line x1="380" y1="90" x2="425" y2="90" class="line" />
  <rect x="430" y="60" width="110" height="60" class="box" />
  <text x="485" y="90" class="text">阀门</text>
  <line x1="540" y1="90" x2="585" y2="90" class="line" />
  <rect x="590" y="60" width="110" height="60" class="box" />
  <text x="645" y="90" class="text">发动机</text>
  <line x1="700" y1="90" x2="880" y2="90" class="line" />
  <text x="820" y="70" class="label" text-anchor="middle">实际车速</text>
  <circle cx="740" cy="90" r="4" fill="black" />
  <line x1="740" y1="90" x2="740" y2="220" class="noline" />
  <line x1="740" y1="220" x2="525" y2="220" class="line" />
  <rect x="375" y="190" width="145" height="60" class="box" />
  <text x="447" y="220" class="text" font-style="italic">轴速传感器</text>
  <line x1="375" y1="220" x2="180" y2="220" class="noline" />
  <line x1="180" y1="220" x2="180" y2="110" class="line" />
  <text x="450" y="320" class="title">图 1 控制系统的方框图</text>
</svg>