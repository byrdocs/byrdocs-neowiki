<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="550" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M0,2 L10,6 L0,10 z" fill="black" />
        </marker>
    </defs>
    
    <!-- Axes -->
    <path d="M 100 450 L 100 50" stroke="black" stroke-width="3" marker-end="url(#arrow)" />
    <path d="M 100 250 L 750 250" stroke="black" stroke-width="3" marker-end="url(#arrow)" />
    
    <!-- Axis Labels -->
    <text x="80" y="255" font-family="serif" font-size="22" text-anchor="end">0</text>
    <text x="250" y="285" font-family="serif" font-size="22" text-anchor="middle">0.1</text>
    <text x="550" y="235" font-family="serif" font-size="24" text-anchor="middle">10</text>
    
    <text x="120" y="70" font-family="serif" font-size="24" font-style="italic">L(ω)</text>
    <text x="175" y="70" font-family="serif" font-size="24">/dB</text>
    
    <text x="720" y="290" font-family="serif" font-size="24" font-style="italic" text-anchor="end">ω</text>
    <text x="725" y="290" font-family="serif" font-size="24">(rad/s)</text>
    
    <!-- Bode Plot Curve -->
    <path d="M 100 130 L 250 170 L 550 330 L 650 410" fill="none" stroke="black" stroke-width="4" />
    
    <!-- Dashed Lines -->
    <path d="M 250 170 L 550 250" fill="none" stroke="black" stroke-width="2" stroke-dasharray="8,6" />
    <path d="M 250 170 L 250 250" fill="none" stroke="black" stroke-width="2" stroke-dasharray="6,4" />
    <path d="M 550 250 L 550 330" fill="none" stroke="black" stroke-width="2" stroke-dasharray="6,4" />
    
    <!-- Slope Labels -->
    <text x="230" y="140" font-family="serif" font-size="22" text-anchor="middle">-20dB/dec</text>
    <text x="380" y="295" font-family="serif" font-size="22" text-anchor="middle">-40dB/dec</text>
    <text x="600" y="425" font-family="serif" font-size="22" text-anchor="middle">-60dB/dec</text>
    
    <!-- Title -->
    <text x="400" y="500" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle">图 4 单位负反馈控制最小相位系统的 <tspan font-family="serif" font-style="italic">Bode</tspan> 图</text>
</svg>