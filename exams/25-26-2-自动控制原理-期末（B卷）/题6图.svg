<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
            <path d="M0,2 L9,5 L0,8 z" fill="black" />
        </marker>
    </defs>

    <!-- Summing Junction -->
    <circle cx="150" cy="100" r="20" fill="none" stroke="black" stroke-width="3" />
    <text x="125" y="75" font-family="sans-serif" font-size="26" font-weight="bold">+</text>
    <text x="125" y="145" font-family="sans-serif" font-size="30" font-weight="bold">-</text>

    <!-- R(s) Input -->
    <path d="M 30 100 L 120 100" stroke="black" stroke-width="3" marker-end="url(#arrow)" />
    <text x="50" y="80" font-family="serif" font-style="italic" font-size="32">R(s)</text>

    <!-- Path to Box 1 -->
    <path d="M 170 100 L 230 100" stroke="black" stroke-width="3" marker-end="url(#arrow)" />

    <!-- Box 1: 校正装置 -->
    <rect x="240" y="40" width="160" height="120" fill="none" stroke="black" stroke-width="4" />
    <path d="M 240 85 L 400 85" stroke="black" stroke-width="3" />
    <text x="320" y="75" font-family="sans-serif" font-size="26" font-weight="bold" text-anchor="middle">校正装置</text>
    <text x="320" y="130" font-family="serif" font-style="italic" font-size="32" text-anchor="middle">G<tspan baseline-shift="sub" font-size="22">c</tspan>(s)</text>

    <!-- Path to Box 2 -->
    <path d="M 400 100 L 520 100" stroke="black" stroke-width="3" marker-end="url(#arrow)" />
    <text x="460" y="80" font-family="serif" font-style="italic" font-size="32" text-anchor="middle">T(s)</text>

    <!-- Box 2: 电动机和臂 -->
    <rect x="530" y="40" width="180" height="120" fill="none" stroke="black" stroke-width="4" />
    <path d="M 530 85 L 710 85" stroke="black" stroke-width="3" />
    <text x="620" y="75" font-family="sans-serif" font-size="26" font-weight="bold" text-anchor="middle">电动机和臂</text>
    <text x="620" y="130" font-family="serif" font-style="italic" font-size="32" text-anchor="middle">G<tspan baseline-shift="sub" font-size="22">0</tspan>(s)</text>

    <!-- Output C(s) -->
    <path d="M 710 100 L 950 100" stroke="black" stroke-width="3" marker-end="url(#arrow)" />
    <text x="880" y="80" font-family="serif" font-style="italic" font-size="32">C(s)</text>

    <!-- Pick-off Point -->
    <circle cx="850" cy="100" r="5" fill="black" />

    <!-- Feedback Path 1 -->
    <path d="M 850 100 L 850 250 L 580 250" fill="none" stroke="black" stroke-width="3" marker-end="url(#arrow)" />

    <!-- Box 3: 传感器 -->
    <rect x="440" y="200" width="130" height="100" fill="none" stroke="black" stroke-width="4" />
    <path d="M 440 240 L 570 240" stroke="black" stroke-width="3" />
    <text x="505" y="230" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">传感器</text>
    <text x="505" y="285" font-family="serif" font-style="italic" font-size="32" text-anchor="middle">H(s)</text>

    <!-- Feedback Path 2 -->
    <path d="M 440 250 L 150 250 L 150 130" fill="none" stroke="black" stroke-width="3" marker-end="url(#arrow)" />

    <!-- Title -->
    <text x="480" y="360" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle">图 5 磁盘驱动读取系统的结构图</text>
</svg>