<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">直流电机反馈系统原理图</title>
  <desc id="desc">电位计给定电压进入放大器，放大器驱动直流电动机；电动机轴连接测速发电机和负载，测速发电机的输出沿下方反馈至放大器。</desc>
  <defs>
    <style>
      .wire { fill: none; stroke: #17252b; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .component { fill: #fff; stroke: #17252b; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .label { fill: #17252b; font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", Arial, sans-serif; font-size: 21px; }
      .small { font-size: 18px; }
      .math { fill: #17252b; font-family: "Times New Roman", "STIX Two Text", serif; font-size: 23px; font-style: italic; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#17252b"/>
    </marker>
    <marker id="torque-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#17252b"/>
    </marker>
  </defs>

  <rect id="background" width="1200" height="430" fill="#fff"/>

  <g id="potentiometer">
    <line class="wire" x1="92" y1="54" x2="92" y2="94"/>
    <circle class="component" cx="92" cy="48" r="6"/>
    <rect class="component" x="76" y="94" width="32" height="120" rx="2"/>
    <line class="wire" x1="92" y1="214" x2="92" y2="252"/>
    <line class="wire" x1="72" y1="252" x2="112" y2="252"/>
    <line class="wire" x1="108" y1="146" x2="200" y2="146"/>
    <text class="label" x="92" y="287" text-anchor="middle">电位计</text>
    <text class="math" x="147" y="132">U<tspan baseline-shift="sub" font-size="15">r</tspan></text>
  </g>

  <g id="amplifier">
    <rect class="component" x="200" y="88" width="112" height="178" rx="2"/>
    <text class="label" x="256" y="142" text-anchor="middle">
      <tspan x="256" dy="0">放</tspan>
      <tspan x="256" dy="31">大</tspan>
      <tspan x="256" dy="31">器</tspan>
    </text>
    <text class="math" x="329" y="164">U<tspan baseline-shift="sub" font-size="15">a</tspan></text>
  </g>

  <g id="armature-circuit">
    <polyline class="wire" points="312,120 365,120 365,91 420,91"/>
    <line class="wire" x1="370" y1="91" x2="405" y2="91" marker-end="url(#arrow)"/>
    <rect class="component" x="420" y="75" width="102" height="32" rx="2"/>
    <polyline class="wire" points="522,91 600,91 600,105"/>
    <circle class="component" cx="600" cy="146" r="41"/>
    <rect class="component" x="583" y="184" width="34" height="39" rx="2"/>
    <polyline class="wire" points="600,223 600,232 365,232 365,210 312,210"/>
    <text class="math" x="382" y="70">I<tspan baseline-shift="sub" font-size="15">a</tspan></text>
    <text class="math" x="463" y="65" text-anchor="middle">R<tspan baseline-shift="sub" font-size="15">a</tspan></text>
    <text class="math" x="548" y="154" text-anchor="end">E<tspan baseline-shift="sub" font-size="15">a</tspan></text>
    <text class="label small" x="600" y="151" text-anchor="middle">电动机</text>
    <text class="label" x="472" y="221" text-anchor="middle">电枢回路</text>
  </g>

  <g id="field-winding">
    <text class="math" x="684" y="66">I<tspan baseline-shift="sub" font-size="15">f</tspan></text>
    <text class="label small" x="704" y="65">＝常数</text>
    <path class="wire" d="M770 90 H698
      C675 90 675 108 698 108
      C675 108 675 126 698 126
      C675 126 675 144 698 144
      C675 144 675 162 698 162
      H770"/>
    <circle class="component" cx="777" cy="90" r="5"/>
    <circle class="component" cx="777" cy="162" r="5"/>
    <text class="label" x="798" y="97">＋</text>
    <text class="label" x="798" y="170">−</text>
  </g>

  <g id="mechanical-shaft">
    <polyline class="wire" points="629,162 710,220 865,326 920,326"/>
    <path class="wire" d="M760 290 A54 54 0 0 1 789 236" marker-end="url(#arrow)"/>
    <text class="math" x="797" y="275">ω, M<tspan baseline-shift="sub" font-size="15">D</tspan>, J</text>
  </g>

  <g id="tachogenerator">
    <rect class="component" x="694" y="184" width="32" height="74" rx="2"/>
    <circle class="component" cx="710" cy="220" r="25"/>
    <line class="wire" x1="692" y1="202" x2="728" y2="238"/>
    <text class="label" x="748" y="218">测速发电机</text>
    <polyline class="wire" points="710,258 710,382 162,382 162,234 200,234"/>
    <text class="math" x="184" y="338">U<tspan baseline-shift="sub" font-size="15">t</tspan></text>
  </g>

  <g id="load">
    <ellipse class="component" cx="932" cy="326" rx="13" ry="42"/>
    <rect class="component" x="932" y="284" width="100" height="84"/>
    <ellipse class="component" cx="1032" cy="326" rx="13" ry="42"/>
    <line class="wire" x1="1045" y1="326" x2="1100" y2="326"/>
    <text class="label" x="982" y="273" text-anchor="middle">负载</text>
    <path class="wire" d="M1060 312 A45 45 0 0 1 1129 351" marker-end="url(#torque-arrow)"/>
    <text class="math" x="1116" y="274" text-anchor="middle">M<tspan baseline-shift="sub" font-size="15">L</tspan></text>
  </g>
</svg>
