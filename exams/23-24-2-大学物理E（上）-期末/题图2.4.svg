<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500">
  <defs>
    <marker id="pathArrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3.5 L0,7 L1.8,3.5 Z" fill="#111"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <!-- 从 q 到 a、b 的位置矢量 -->
  <line x1="120" y1="350" x2="435" y2="120" stroke="#111" stroke-width="5" stroke-linecap="round"/>
  <line x1="120" y1="350" x2="620" y2="420" stroke="#111" stroke-width="5" stroke-linecap="round"/>
  <!-- 从 a 到 b 的任意路径 -->
  <path d="M435 120 C485 122 520 132 530 165 C537 188 519 215 529 246 C542 284 590 272 612 315 C630 350 635 386 620 420"
        fill="none" stroke="#111" stroke-width="5" stroke-linecap="round"/>
  <!-- 路径方向箭头 -->
  <path d="M533 246 C548 274 576 275 594 293" fill="none" stroke="#111" stroke-width="4" marker-end="url(#pathArrow)"/>
  <!-- 路径上的点电荷 -->
  <circle cx="530" cy="165" r="8" fill="#111"/>
  <!-- 标签 -->
  <text x="75" y="355" font-family="Times New Roman, STIX Two Math, serif" font-size="52" font-style="italic">q</text>
  <text x="410" y="96" font-family="Times New Roman, STIX Two Math, serif" font-size="50" font-style="italic">a</text>
  <text x="635" y="454" font-family="Times New Roman, STIX Two Math, serif" font-size="50" font-style="italic">b</text>
  <text x="560" y="177" font-family="Times New Roman, STIX Two Math, serif" font-size="48" font-style="italic">q<tspan font-size="30" baseline-shift="sub">0</tspan></text>
  <text x="250" y="208" font-family="Times New Roman, STIX Two Math, serif" font-size="46" font-style="italic">r<tspan font-size="29" baseline-shift="sub">a</tspan></text>
  <text x="315" y="421" font-family="Times New Roman, STIX Two Math, serif" font-size="46" font-style="italic">r<tspan font-size="29" baseline-shift="sub">b</tspan></text>
</svg>
