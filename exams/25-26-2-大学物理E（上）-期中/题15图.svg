<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* 默认浅色模式：浅灰背景，深蓝线条 */
    :root {
      --bg: #e2e9f0;
      --fg: #2b3b4c;
    }

    /* 深色模式：深色背景，亮灰色线条 */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1b1e;
        --fg: #d1d5db;
      }
    }

    /* 状态切换过渡 */
    rect, circle, path, text {
      transition: fill 0.3s, stroke 0.3s;
    }

    .background { fill: var(--bg); }
    .stroke-main { stroke: var(--fg); fill: none; stroke-width: 3; }
    .fill-bg { fill: var(--bg); stroke: var(--fg); stroke-width: 3; }
    .text-omega { fill: var(--fg); font-family: "Times New Roman", serif; font-style: italic; font-size: 44px; text-anchor: middle; }
    .text-caption { fill: var(--fg); font-family: "SimSun", serif; font-size: 48px; text-anchor: middle; }
    .marker-fill { fill: var(--fg); }
  </style>

  <defs>
    <marker id="rotate-arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="7" orient="auto">
      <polygon points="0,0 12,6 0,12" class="marker-fill" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="background" />

  <g>
    <rect x="220" y="180" width="60" height="500" class="fill-bg" rx="2" />
    <circle cx="250" cy="250" r="150" class="stroke-main" />
    <path d="M 360 250 A 110 110 0 0 0 140 250" class="stroke-main" marker-end="url(#rotate-arrow)" />
    <text x="250" y="125" class="text-omega">ω</text>
  </g>

  <g>
    <rect x="570" y="180" width="60" height="500" class="fill-bg" rx="2" />
    <circle cx="600" cy="250" r="150" class="stroke-main" />
    <path d="M 710 250 A 110 110 0 0 0 490 250" class="stroke-main" marker-end="url(#rotate-arrow)" />
    <text x="600" y="125" class="text-omega">ω</text>
  </g>

  <text x="425" y="750" class="text-caption">题 15 图</text>
</svg>
