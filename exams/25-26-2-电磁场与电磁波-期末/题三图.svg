<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 820" width="800" height="820">
  <defs>
    <!-- 箭头标记 -->
    <marker id="arrowhead" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#222"/>
    </marker>
    <!-- 斜线填充图案 - 统一45度方向 -->
    <pattern id="diagonalHatch" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#444" stroke-width="2"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="820" fill="#e6e6e6"/>

  <!-- 
    设计参数：
    - 圆心: (400, 400)
    - 外环半径: 267.5
    - 内环半径: 212.5
    - 环厚度: 55
    - 环中线半径: 240
    - 缺口中心: 90度（正下方）
    - 缺口宽度: 22度 (79° ~ 101°)
    - 分割线: 每18度一条，共20条，跳过缺口内的90度线
  -->

  <!-- 单一环形路径（带缺口），确保填充连续一致 -->
  <!-- 缺口右边缘79度 -> 沿外环逆时针(大弧)到缺口左边缘101度 -> 向内到内环 -> 沿内环顺时针回来 -->
  <path d="
    M 451.0 662.6
    A 267.5 267.5 0 1 0 349.0 662.6
    L 359.5 608.6
    A 212.5 212.5 0 1 1 440.5 608.6
    Z
  " fill="url(#diagonalHatch)" stroke="#222" stroke-width="2"/>

  <!-- 径向分割线（叠片）- 精确三角函数计算 -->
  <!-- 每隔18度一条，从270度(顶部)开始顺时针分布，跳过90度缺口处 -->
  <g stroke="#222" stroke-width="1.5">
    <!-- 270度 顶部 -->
    <line x1="400.0" y1="132.5" x2="400.0" y2="187.5"/>
    <!-- 288度 -->
    <line x1="482.7" y1="145.6" x2="465.7" y2="197.9"/>
    <!-- 306度 -->
    <line x1="557.2" y1="183.6" x2="524.9" y2="228.1"/>
    <!-- 324度 -->
    <line x1="616.4" y1="242.8" x2="571.9" y2="275.1"/>
    <!-- 342度 -->
    <line x1="654.4" y1="317.3" x2="602.1" y2="334.3"/>
    <!-- 0度 右侧 -->
    <line x1="667.5" y1="400.0" x2="612.5" y2="400.0"/>
    <!-- 18度 -->
    <line x1="654.4" y1="482.7" x2="602.1" y2="465.7"/>
    <!-- 36度 -->
    <line x1="616.4" y1="557.2" x2="571.9" y2="524.9"/>
    <!-- 54度 -->
    <line x1="557.2" y1="616.4" x2="524.9" y2="571.9"/>
    <!-- 72度 缺口右侧上方 -->
    <line x1="482.7" y1="654.4" x2="465.7" y2="602.1"/>
    <!-- 108度 缺口左侧上方 -->
    <line x1="317.3" y1="654.4" x2="334.3" y2="602.1"/>
    <!-- 126度 -->
    <line x1="242.8" y1="616.4" x2="275.1" y2="571.9"/>
    <!-- 144度 -->
    <line x1="183.6" y1="557.2" x2="228.1" y2="524.9"/>
    <!-- 162度 -->
    <line x1="145.6" y1="482.7" x2="197.9" y2="465.7"/>
    <!-- 180度 左侧 -->
    <line x1="132.5" y1="400.0" x2="187.5" y2="400.0"/>
    <!-- 198度 -->
    <line x1="145.6" y1="317.3" x2="197.9" y2="334.3"/>
    <!-- 216度 -->
    <line x1="183.6" y1="242.8" x2="228.1" y2="275.1"/>
    <!-- 234度 -->
    <line x1="242.8" y1="183.6" x2="275.1" y2="228.1"/>
    <!-- 252度 -->
    <line x1="317.3" y1="145.6" x2="334.3" y2="197.9"/>
  </g>

  <!-- 内部虚线（磁力线）- 完整的圆 -->
  <circle cx="400" cy="400" r="240" stroke="#222" stroke-width="1.3" stroke-dasharray="7 5" fill="none"/>

  <!-- 半径标注 R：从圆心向上到环顶部 -->
  <line x1="400" y1="400" x2="400" y2="160" stroke="#222" stroke-width="1.8" marker-end="url(#arrowhead)"/>
  <text x="435" y="295" font-family="Times New Roman, serif" font-size="44" font-style="italic" fill="#222">R</text>

  <!-- 缺口宽度 d 标注 - 虚线连接两端面 -->
  <text x="380" y="620" font-family="Times New Roman, serif" font-size="38" font-style="italic" fill="#222">d</text>

  <!-- 左侧缺口端面下方的向下箭头 -->
  <line x1="315" y1="665" x2="315" y2="755" stroke="#222" stroke-width="2.8" marker-end="url(#arrowhead)"/>
  
  <!-- 右侧缺口端面下方的向上箭头 -->
  <line x1="485" y1="755" x2="485" y2="665" stroke="#222" stroke-width="2.8" marker-end="url(#arrowhead)"/>

  <!-- R >> d 标注文字 -->
  <text x="540" y="750" font-family="Times New Roman, serif" font-size="34" font-style="italic" fill="#222">
    R <tspan font-size="30" dy="-6">&gt;&gt;</tspan> d
  </text>

</svg>
